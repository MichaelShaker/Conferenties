name: Build, Test, Push and Prepare Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get short commit hash
        id: vars
        run: echo "hash=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Start CI stack
        run: docker compose -f compose.ci.yml up -d --build

      - name: Wait for backend health
        run: |
          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:8096/api/health; then
              exit 0
            fi
            sleep 3
          done
          echo "Backend did not become ready in time"
          docker compose -f compose.ci.yml ps || true
          docker compose -f compose.ci.yml logs || true
          exit 1

      - name: Wait for frontend
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3096 > /tmp/response.html; then
              exit 0
            fi
            sleep 2
          done
          echo "Frontend did not become ready in time"
          docker compose -f compose.ci.yml ps || true
          docker compose -f compose.ci.yml logs || true
          exit 1

      - name: Validate frontend response
        run: |
          grep -qi "<html" /tmp/response.html

      - name: Stop CI stack
        if: always()
        run: |
          docker compose -f compose.ci.yml logs || true
          docker compose -f compose.ci.yml down -v

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            michaels12/conferenties-frontend:latest
            michaels12/conferenties-frontend:${{ steps.vars.outputs.hash }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            michaels12/conferenties-backend:latest
            michaels12/conferenties-backend:${{ steps.vars.outputs.hash }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-test-push

    steps:
      - name: Deployment placeholder
        run: echo "Build, test and push succeeded."