name: conferenties-ci

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: conferenties
      MYSQL_USER: conferenties_user
      MYSQL_PASSWORD: conferenties_pass
    ports:
      - "3310:3306"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./database/seed.test.sql:/docker-entrypoint-initdb.d/02-seed.test.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - path: ./backend/.env
        required: false
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: conferenties_user
      DB_PASSWORD: conferenties_pass
      DB_NAME: conferenties
      NODE_ENV: test
      JWT_SECRET: ${JWT_SECRET:-ci_jwt_secret_for_build_checks_only_123456789}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-ci_encryption_key_for_build_checks_only_123456789}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3097}
    ports:
      - "8097:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "3097:80"
